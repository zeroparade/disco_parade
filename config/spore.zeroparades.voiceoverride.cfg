## Settings file for ZERO PARADES Voice Override
## Plugin GUID: spore.zeroparades.voiceoverride

[Hotkeys]

## Cycles presets: original game VO, original + missing VO, male redub, female redub.
ToggleOverrideKey = F1

## Cycles redub profile: off, male, female.
CycleProfileKey = F2

## Toggles extra-character missing VO.
ToggleExtraVoicesKey = F3

## Toggles narrator-only missing VO.
ToggleNarratorMissingVoicesKey = F4

## Sends/marks the latest dialogue in the live-fix tool.
LiveFixMarkKey = F6

## Replays the latest live-fix/override WAV.
LiveFixReplayKey = F7

## Toggles live-fix event capture and live override lookup.
LiveFixToggleKey = F8

## Shows the latest captured dialogue ID and text.
ReportLatestDialogueKey = F10

## Toggles recurring voice-pack update toasts.
ToggleVoicePackUpdateToastsKey = F11

## Toggles debug playback toasts.
ToggleDebugToastsKey = F12

[Profiles]

## Active redub profile. Supported values: off, male, female.
OverrideProfile = male

## Override folder for the male redub profile. Relative paths are resolved under BepInEx.
MaleOverrideRoot = voice-overrides

## Override folder for the female redub profile. Relative paths are resolved under BepInEx.
FemaleOverrideRoot = voice-overrides-female

## Supplemental override folder for extra-character missing/silent dialogue.
ExtraOverrideRoot = voice-override-extras

## Supplemental override folder for narrator-only missing/silent dialogue.
NarratorOverrideRoot = voice-override-narrator

[Runtime]

## Master custom voice switch. Presets and feature hotkeys update this automatically.
OverrideEnabled = true

## If true, supplemental extra-character voices are used for matching missing/silent dialogue cards.
ExtraVoicesEnabled = true

## If true, narrator-only missing/silent dialogue is filled from the narrator override folder.
NarratorMissingVoicesEnabled = false

## If true, the game's original VO is allowed to play even when an override file exists.
OriginalVoiceEnabledWhenOverrideExists = false

## If true, the game's original VO is allowed if an override file exists but cannot be played.
AllowOriginalVoiceWhenOverrideFails = true

## If true, the mod checks installed voice-pack metadata against remote URLs and shows recurring update toasts when updates are available.
VoicePackUpdateToastsEnabled = true

## How often to repeat the voice-pack update toast while updates are available.
VoicePackUpdateToastRepeatMinutes = 30

[Audio]

## If true, external WAV/OGG files are opened with FMOD streaming instead of preloading the whole file.
UseFmodStreaming = true

[LiveFix]

## If true, write live dialogue events and check the live-fix override folder before shipped voice packs.
LiveFixEnabled = true

## If true, a live-fix WAV suppresses the original game VO when a VO event exists.
LiveFixSkipOriginal = true

## Live repair workspace. Relative paths are resolved under BepInEx.
LiveFixRoot = voice-live-fix
